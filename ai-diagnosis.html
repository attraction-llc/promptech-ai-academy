<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI活用レベル無料診断｜PrompTech AI Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg-card:#12121a;--text:#e8e8f0;--text-dim:#8888a0;--accent:#00d4aa;--accent2:#4d7cff;--accent3:#ff6b4a;--accent4:#ffd34e;--accent5:#c77dff;--border:#2a2a3a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}

/* ===== HERO ===== */
.diag-hero{padding:60px 24px 48px;text-align:center;background:linear-gradient(180deg,rgba(77,124,255,.06) 0%,transparent 100%);border-bottom:1px solid var(--border)}
.diag-hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);border:1px solid rgba(77,124,255,.3);padding:6px 20px;border-radius:100px;margin-bottom:20px}
.diag-hero h1{font-family:'Outfit',sans-serif;font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;line-height:1.3;margin-bottom:12px}
.diag-hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent2),var(--accent5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.diag-hero p{color:var(--text-dim);font-size:15px;max-width:520px;margin:0 auto 24px}
.diag-hero-tags{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.diag-hero-tag{font-size:12px;color:var(--text-dim);background:rgba(255,255,255,.04);border:1px solid var(--border);padding:6px 14px;border-radius:100px}

/* ===== WRAPPER ===== */
.diag-wrap{max-width:680px;margin:0 auto;padding:48px 24px 80px}

/* ===== PROGRESS ===== */
.prog-wrap{margin-bottom:36px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-step{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--accent2)}
.prog-pct{font-size:12px;color:var(--text-dim)}
.prog-track{height:6px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent5));border-radius:100px;transition:width .5s ease;width:0%}

/* ===== QUESTION ===== */
#diag-questions{display:block}
.dq-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:36px 32px;animation:dqIn .3s ease both}
@keyframes dqIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.dq-card.exit{animation:dqOut .2s ease both}
@keyframes dqOut{to{opacity:0;transform:translateY(-12px)}}
.dq-q-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.dq-q-icon{font-size:32px;line-height:1}
.dq-q-num{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:2px}
.dq-q-text{font-size:clamp(16px,2.5vw,20px);font-weight:700;line-height:1.5;margin-bottom:24px}
.dq-opts{display:flex;flex-direction:column;gap:10px}
.dq-opt{background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;text-align:left;cursor:pointer;display:flex;align-items:flex-start;gap:14px;transition:all .18s;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;width:100%}
.dq-opt:hover{border-color:rgba(77,124,255,.5);background:rgba(77,124,255,.06);transform:translateX(4px)}
.dq-opt.selected{border-color:var(--accent2);background:rgba(77,124,255,.12)}
.dq-opt-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:transparent;transition:all .18s;margin-top:1px}
.dq-opt.selected .dq-opt-check{background:var(--accent2);border-color:var(--accent2);color:#fff}
.dq-opt-body{flex:1}
.dq-opt-label{font-weight:600;display:block}
.dq-opt-hint{font-size:12px;color:var(--text-dim);margin-top:3px;display:block}

/* ===== RESULT ===== */
#diag-result{display:none}
#diag-result.visible{display:block;animation:dqIn .4s ease both}
.dr-section{margin-bottom:20px}

.dr-hero{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center}
.dr-level-badge{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;padding:8px 20px;border-radius:100px;border:1px solid;margin-bottom:8px}
.dr-company-tag{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.dr-gauge-wrap{display:flex;justify-content:center;margin-bottom:8px}
.dr-gauge-label{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:12px}
.dr-level-desc{font-size:14px;color:var(--text-dim);line-height:1.7;max-width:480px;margin:0 auto}

.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dr-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:22px}
.dr-card-label{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:1px;margin-bottom:12px}
.dr-card-loss{border-color:rgba(255,107,74,.25)}
.dr-loss-val{font-family:'Outfit',sans-serif;font-size:2.2rem;font-weight:800;color:var(--accent3)}
.dr-loss-unit{font-size:14px;color:var(--text-dim);margin-left:4px}
.dr-loss-annual{font-size:13px;color:var(--text-dim);margin-top:6px}
.dr-loss-annual strong{color:var(--accent3)}
.dr-loss-opp{font-size:12px;color:var(--text-dim);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06)}
.dr-loss-opp strong{color:var(--accent4)}
.dr-card-note{font-size:10px;color:var(--text-dim);margin-top:10px;line-height:1.5}

.dr-compare{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:22px}
.dr-compare-title{font-size:13px;font-weight:700;margin-bottom:16px}
.dr-cmp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dr-cmp-label{font-size:12px;color:var(--text-dim);min-width:110px;flex-shrink:0}
.dr-bar-wrap{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden}
.dr-bar{height:100%;border-radius:100px;transition:width 1.2s ease}
.dr-bar-you{background:linear-gradient(90deg,var(--accent2),var(--accent5))}
.dr-bar-top{background:linear-gradient(90deg,var(--accent),#00b894)}
.dr-cmp-pct{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;min-width:36px;text-align:right}
.dr-cmp-gap{font-size:13px;color:var(--text-dim);padding:12px;background:rgba(255,107,74,.06);border:1px solid rgba(255,107,74,.15);border-radius:8px;margin-top:10px;line-height:1.6}
.dr-data-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.dr-data-item{text-align:center;background:rgba(0,212,170,.04);border:1px solid rgba(0,212,170,.12);border-radius:8px;padding:14px 8px}
.dr-data-num{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.dr-data-desc{font-size:11px;color:var(--text-dim);line-height:1.4;margin-bottom:4px}
.dr-data-src{font-size:9px;color:rgba(136,136,160,.5)}

.dr-rec{background:linear-gradient(135deg,rgba(77,124,255,.06),rgba(199,125,255,.04));border:1px solid rgba(77,124,255,.2);border-radius:14px;padding:22px}
.dr-rec-label{font-size:12px;color:var(--accent2);font-weight:700;margin-bottom:8px}
.dr-rec-name{font-size:17px;font-weight:700;margin-bottom:6px}
.dr-rec-note{font-size:12px;color:var(--text-dim)}

/* ===== LEAD FORM ===== */
#diag-lead-form{display:none}
#diag-lead-form.visible{display:block;animation:dqIn .3s ease both}
.lf-card{background:var(--bg-card);border:1px solid rgba(0,212,170,.2);border-radius:16px;padding:32px}
.lf-title{font-size:18px;font-weight:900;margin-bottom:8px}
.lf-desc{font-size:14px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}
.lf-desc strong{color:var(--text)}
.lf-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.lf-field{display:flex;flex-direction:column;gap:6px}
.lf-label{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.lf-req{font-size:10px;background:rgba(255,107,74,.15);color:var(--accent3);padding:2px 6px;border-radius:4px;font-weight:700}
.lf-opt{font-size:10px;background:rgba(136,136,160,.12);color:var(--text-dim);padding:2px 6px;border-radius:4px}
.lf-input{background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:border-color .2s;outline:none;width:100%}
.lf-input::placeholder{color:rgba(136,136,160,.5)}
.lf-input:focus{border-color:var(--accent2);background:rgba(77,124,255,.04)}
.lf-status{font-size:13px;min-height:20px;margin-bottom:8px}
.lf-submit-btn{width:100%;padding:17px;font-size:15px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#00b894);color:#0a0a0f;font-weight:700;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:'Noto Sans JP',sans-serif}
.lf-submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,170,.3)}
.lf-submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.lf-privacy{font-size:11px;color:var(--text-dim);margin-top:12px;text-align:center;line-height:1.5}
.lf-back{background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;margin-top:12px;display:block;width:100%;text-align:center;font-family:'Noto Sans JP',sans-serif;padding:8px}
.lf-back:hover{color:var(--text)}

/* ===== SUCCESS ===== */
#diag-success{display:none}
#diag-success.visible{display:block;animation:dqIn .4s ease both}
.suc-card{background:var(--bg-card);border:1px solid rgba(0,212,170,.25);border-radius:16px;padding:40px 32px;text-align:center}
.suc-icon{font-size:52px;margin-bottom:16px}
.suc-title{font-size:22px;font-weight:900;margin-bottom:10px}
.suc-desc{font-size:14px;color:var(--text-dim);line-height:1.7;margin-bottom:28px}
.suc-desc strong{color:var(--text)}
.suc-cal-btn{display:inline-block;background:linear-gradient(135deg,var(--accent2),var(--accent5));color:#fff;font-weight:700;font-size:16px;padding:18px 48px;border-radius:100px;text-decoration:none;transition:transform .2s,box-shadow .2s;margin-bottom:12px}
.suc-cal-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(77,124,255,.35)}
.suc-note{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.suc-restart{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:13px;padding:10px 24px;border-radius:100px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.suc-restart:hover{border-color:var(--accent);color:var(--accent)}

/* ===== BUTTONS ===== */
.btn-primary{background:linear-gradient(135deg,var(--accent),#00b894);color:#0a0a0f;font-weight:700;font-size:15px;padding:15px 32px;border:none;border-radius:100px;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s;font-family:'Noto Sans JP',sans-serif;display:inline-block}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,.3)}
.btn-secondary{background:transparent;color:var(--text);font-weight:500;font-size:14px;padding:14px 28px;border:1px solid var(--border);border-radius:100px;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* ===== FOOTER ===== */
.diag-footer{text-align:center;padding:32px 24px;border-top:1px solid var(--border);color:var(--text-dim);font-size:12px}
.diag-footer a{color:var(--accent2);text-decoration:none}

@media(max-width:540px){
  .dr-grid{grid-template-columns:1fr}
  .dq-card{padding:24px 20px}
  .lf-card{padding:24px 20px}
  .suc-card{padding:28px 20px}
  .dr-cmp-label{min-width:80px;font-size:11px}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="diag-hero">
  <div class="diag-hero-badge">🔬 無料診断ツール</div>
  <h1>御社のAI活用レベルを<br><em>数字で見える化する</em></h1>

  <div class="diag-hero-tags">
    <span class="diag-hero-tag">📊 5軸レーダー分析</span>

    <span class="diag-hero-tag">🎓 推奨研修を提案</span>
  </div>
</div>

<!-- MAIN -->
<div class="diag-wrap">

  <!-- PROGRESS -->
  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-top">
      <span class="prog-step" id="prog-step">STEP 1 / 10</span>
      <span class="prog-pct" id="prog-pct">0%</span>

    <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>

<div class="diag-footer">

</div>

<script>
const CAL_URL='https://cal.com/chojun-sot4lz/60%E5%88%86%E9%96%93%E3%81%AE%E3%83%9F%E3%83%86%E3%82%A3%E3%83%B3%E3%82%AF';

const QUESTIONS=[
  {id:'q1',text:'現在のAI活用状況を教えてください',icon:'🏢',options:[
    {label:'全く使っていない',val:0,hint:'多くの競合がすでに導入済みです'},
    {label:'個人が試しに使っている',val:1,hint:'組織的な活用まであと一歩'},
    {label:'一部の業務で活用中',val:2,hint:'さらなる拡大で差がつきます'},
    {label:'全社的に活用している',val:3,hint:'さらに深化させる余地があります'}
  ]},
  {id:'q2',text:'従業員規模を教えてください',icon:'👥',options:[
    {label:'1〜9名',val:'s'},
    {label:'10〜29名',val:'m'},
    {label:'30〜99名',val:'l'},
    {label:'100名以上',val:'xl'}
  ]},
  {id:'q3',text:'業種はどれに近いですか？',icon:'🏭',options:[
    {label:'製造・建設',val:'mfg'},
    {label:'小売・サービス',val:'ret'},
    {label:'医療・福祉',val:'med'},
    {label:'IT・専門職',val:'it'},
    {label:'その他',val:'other'}
  ]},
  {id:'q4',text:'月間の「繰り返し事務作業」にかかる時間は？',icon:'⏱',options:[
    {label:'ほぼない',val:0},
    {label:'月10〜20時間',val:10},
    {label:'月20〜50時間',val:30},
    {label:'月50時間以上',val:60}
  ]},
  {id:'q5',text:'社内に「AIを推進できる人材」はいますか？',icon:'🧑‍💻',options:[
    {label:'いない',val:0},
    {label:'関心はあるが知識が薄い',val:1},
    {label:'独学で試している人がいる',val:2},
    {label:'実務で活用できる人がいる',val:3}
  ]},
  {id:'q6',text:'競合他社のAI活用状況の印象は？',icon:'🏆',options:[
    {label:'わからない／気にしていない',val:0},
    {label:'一部が始めていると聞く',val:1},
    {label:'多くが取り組んでいる',val:2},
    {label:'かなり進んでいる印象',val:3}
  ]},
  {id:'q7',text:'AI研修に取り組む優先度は？',icon:'📈',options:[
    {label:'まだ検討段階',val:0},
    {label:'半年〜1年以内に動きたい',val:1},
    {label:'3ヶ月以内に動きたい',val:2},
    {label:'すぐにでも始めたい',val:3}
  ]},
  {id:'q8',text:'業務課題として最も深刻なものは？',icon:'🔍',options:[
    {label:'人手不足・採用難',val:'hr'},
    {label:'残業・長時間労働',val:'ot'},
    {label:'情報共有・ナレッジ管理',val:'km'},
    {label:'コスト削減・利益率改善',val:'cost'}
  ]},
  {id:'q9',text:'1人あたりの平均月給（概算）は？',icon:'💰',options:[
    {label:'〜25万円',val:250000},
    {label:'25〜35万円',val:300000},
    {label:'35〜50万円',val:400000},
    {label:'50万円以上',val:550000}
  ]},
  {id:'q10',text:'AI活用で最優先にしたいことは？',icon:'🎯',options:[
    {label:'書類・報告書の作成効率化',val:'doc'},
    {label:'顧客対応・営業支援',val:'sales'},
    {label:'社内教育・ナレッジ共有',val:'edu'},
    {label:'データ分析・意思決定支援',val:'data'}
  ]}
];

const SIZE_LABEL={s:'1〜9名',m:'10〜29名',l:'30〜99名',xl:'100名以上'};
const SIZE_COUNT={s:5,m:19,l:64,xl:150};
const INDUSTRY_LABEL={mfg:'製造・建設',ret:'小売・サービス',med:'医療・福祉',it:'IT・専門職',other:'その他'};
const PRIORITY_LABEL={doc:'書類作成効率化',sales:'顧客対応・営業',edu:'社内教育・ナレッジ',data:'データ分析・意思決定'};
const CHALLENGE_LABEL={hr:'人手不足・採用難',ot:'残業・長時間労働',km:'情報共有・ナレッジ',cost:'コスト削減・利益改善'};

let answers={};
let currentQ=0;
let animating=false;

function calcScores(){
  const aiLevel=Number(answers.q1||0);
  const talentScore=Number(answers.q5||0);
  const compScore=Number(answers.q6||0);
  const urgency=Number(answers.q7||0);
  const waste=Number(answers.q4||0);
  const scores={
    ai:Math.round((aiLevel/3)*100),
    talent:Math.round((talentScore/3)*100),
    urgency:Math.round((urgency/3)*100),
    competitive:Math.round((compScore/3)*100),
    efficiency:waste===0?5:waste===10?25:waste===30?55:80
  };
  const overall=Math.round((scores.ai+scores.talent+scores.urgency)*0.4+(scores.competitive+scores.efficiency)*0.3*0.5);
  return{scores,overall:Math.min(overall,100)};
}

function calcLoss(){
  const headcount=SIZE_COUNT[answers.q2||'m'];
  const salary=Number(answers.q9||300000);
  const wasteH=Number(answers.q4||30);
  const aiLevel=Number(answers.q1||0);
  const hourlyCost=salary*1.3/160;
  const unusedMulti=[2.4,1.7,1.2,1.0][aiLevel]||1.7;
  const monthlyLoss=Math.round(hourlyCost*wasteH*headcount*0.65*unusedMulti);
  const annualLoss=monthlyLoss*12;
  const opportunityCost=Math.round(salary*headcount*0.4*unusedMulti);
  return{monthlyLoss,annualLoss,opportunityCost};
}

function getLevel(overall){
  if(overall>=70)return{label:'AI活用推進中',color:'var(--accent)',icon:'🚀',desc:'一定の取り組みはあります。さらに体系化することで競合に大きく差をつけられます。'};
  if(overall>=40)return{label:'部分的に着手',color:'var(--accent2)',icon:'⚡',desc:'AI活用は始まっていますが、全社的な底上げが必要です。今が投資の最適タイミングです。'};
  return{label:'早急な対応が必要',color:'var(--accent3)',icon:'⚠️',desc:'AI未活用の状態が続くと、競合との差は毎月拡大します。今すぐ行動を起こすことが重要です。'};
}

function getRecommend(){
  const challenge=answers.q8||'ot';
  const priority=answers.q10||'doc';

function fmtYen(n){return n>=10000?Math.round(n/10000)+'万円':n.toLocaleString()+'円';}

function updateProgress(idx){
  const pct=Math.round((idx/QUESTIONS.length)*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-step').textContent='STEP '+(idx+1)+' / '+QUESTIONS.length;
  document.getElementById('prog-pct').textContent=pct+'%';
}

function renderQuestion(idx){
  const q=QUESTIONS[idx];
  const wrap=document.getElementById('diag-questions');
  wrap.innerHTML=`
    <div class="dq-card">
      <div class="dq-q-header">
        <span class="dq-q-icon">${q.icon}</span>
        <span class="dq-q-num">Q${idx+1} / ${QUESTIONS.length}</span>
      </div>
      <div class="dq-q-text">${q.text}</div>
      <div class="dq-opts">
        ${q.options.map((o,oi)=>`
          <button class="dq-opt" data-val="${o.val}" data-oi="${oi}">
            <span class="dq-opt-check">✓</span>
            <div class="dq-opt-body">
              <span class="dq-opt-label">${o.label}</span>
              ${o.hint?`<span class="dq-opt-hint">${o.hint}</span>`:''}
            </div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  wrap.querySelectorAll('.dq-opt').forEach(btn=>{
    btn.addEventListener('click',function(){
      if(animating)return;
      answers['q'+(idx+1)]=this.dataset.val;
      wrap.querySelectorAll('.dq-opt').forEach(b=>b.classList.remove('selected'));
      this.classList.add('selected');
      animating=true;
      const card=wrap.querySelector('.dq-card');
      card.classList.add('exit');
      setTimeout(()=>{
        animating=false;
        if(idx+1>=QUESTIONS.length){
          wrap.innerHTML='';
          document.getElementById('prog-bar').style.width='100%';
          document.getElementById('prog-step').textContent='診断完了';
          document.getElementById('prog-pct').textContent='100%';
          showResult();
        } else {
          currentQ=idx+1;
          renderQuestion(currentQ);
          updateProgress(currentQ);
        }
      },220);
    });
  });
  updateProgress(idx);
}

function drawRadar(canvas,scores){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2,r=Math.min(W,H)*0.33;
  const labels=['AI活用度','人材力','緊急度','競合意識','効率化'];
  const vals=[scores.ai,scores.talent,scores.urgency,scores.competitive,scores.efficiency];
  const N=5;
  ctx.clearRect(0,0,W,H);
  for(let ring=1;ring<=4;ring++){
    ctx.beginPath();
    for(let i=0;i<N;i++){
      const a=-Math.PI/2+i*(2*Math.PI/N);
      const rr=r*ring/4;
      i===0?ctx.moveTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));
    }
    ctx.closePath();ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a=-Math.PI/2+i*(2*Math.PI/N);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.stroke();
    const lx=cx+(r+26)*Math.cos(a),ly=cy+(r+26)*Math.sin(a);
    ctx.fillStyle='rgba(200,200,220,0.65)';ctx.font='bold 10px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labels[i],lx,ly);
  }
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const a=-Math.PI/2+i*(2*Math.PI/N),rr=r*(v/100);
    i===0?ctx.moveTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));
  });
  ctx.closePath();ctx.fillStyle='rgba(0,212,170,0.15)';ctx.fill();
  ctx.strokeStyle='rgba(0,212,170,0.8)';ctx.lineWidth=2;ctx.stroke();
  vals.forEach((v,i)=>{
    const a=-Math.PI/2+i*(2*Math.PI/N),rr=r*(v/100);
    ctx.beginPath();ctx.arc(cx+rr*Math.cos(a),cy+rr*Math.sin(a),4,0,Math.PI*2);
    ctx.fillStyle='#00d4aa';ctx.fill();
  });
}

function drawGauge(canvas,val){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H*0.65,r=Math.min(W,H)*0.4;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,Math.PI+(Math.PI*(val/100)));
  const g=ctx.createLinearGradient(cx-r,0,cx+r,0);
  g.addColorStop(0,'#ff6b4a');g.addColorStop(0.5,'#ffd34e');g.addColorStop(1,'#00d4aa');
  ctx.strokeStyle=g;ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
  ctx.fillStyle='rgba(200,200,220,0.9)';ctx.font='bold 26px Outfit,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(val+'点',cx,cy-6);
  ctx.font='11px sans-serif';ctx.fillStyle='rgba(150,150,170,0.7)';ctx.fillText('/100',cx,cy+16);
}

async function submitLead(overall,levelLabel,monthlyLoss,annualLoss,rec){

  const btn=document.getElementById('lf-submit');

  if(!name){status.textContent='お名前を入力してください';status.style.color='var(--accent3)';return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){status.textContent='正しいメールアドレスを入力してください';status.style.color='var(--accent3)';return;}

  btn.disabled=true;btn.textContent='送信中...';status.textContent='';

  const sizeLabel=SIZE_LABEL[answers.q2||'m'];
